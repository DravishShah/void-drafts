<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOID.DRAFTS — Home for the homegrown brands of India</title>

    <style>
      /* ============================================================
      FONT — Montech v02
      ============================================================ */
      @font-face {
        font-family: "Montech";
        src: url("fonts/MONTECHV02-Regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Montech Italic";
        src: url("fonts/MONTECHV02-SemiBoldItalic.otf") format("opentype");
        font-weight: 600;
        font-style: italic;
        font-display: swap;
      }

      @font-face {
        font-family: "Montech Bold";
        src: url("fonts/MONTECHV02-Bold.otf") format("opentype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Montech Black";
        src: url("fonts/MONTECHV02-Black.otf") format("opentype");
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Montech Black Italic";
        src: url("fonts/MONTECHV02-BlackItalic.otf") format("opentype");
        font-weight: 900;
        font-style: italic;
        font-display: swap;
      }

      :root {
        --red: #ff0000;
        --black: #0a0a0a;
        --white: #ffffff;
        --font-display: "Montech", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--white);
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        font-family: var(--font-display);
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        color: var(--black);
        height: 100vh;
        height: 100svh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ---------- Header / Logo ---------- */
      header {
        flex: 0 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 13vh;
        padding: 0 20px;
        z-index: 10;
        position: relative;
      }

      header img {
        width: auto;
        height: clamp(28px, 4vh, 40px);
        display: block;
      }

      /* ---------- Draggable canvas ---------- */
      .canvas-wrap {
        flex: 1 1 auto;
        min-height: 0;
        position: relative;
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        /* FIXED: Changed from hidden to visible so items can overlap headline */
        overflow: visible;
        z-index: 5;
      }

      #canvas {
        position: relative;
        width: 100%;
        max-width: 1100px;
        height: 100%;
        margin: 0 auto;
        touch-action: none;
      }

      .drag-item {
        position: absolute;
        cursor: grab;
        -webkit-user-select: none;
        user-select: none;
        -webkit-user-drag: none;
        touch-action: none;
        filter: drop-shadow(0 18px 26px rgba(0, 0, 0, 0.16));
        transition: filter 0.18s ease;
        will-change: transform;
      }

      .drag-item img {
        display: block;
        width: 100%;
        height: auto;
        pointer-events: none;
        -webkit-user-drag: none;
      }

      .drag-item:hover {
        filter: drop-shadow(0 22px 32px rgba(0, 0, 0, 0.22));
      }

      .drag-item.dragging {
        cursor: grabbing;
        filter: drop-shadow(0 28px 38px rgba(0, 0, 0, 0.28));
      }

      .drag-item.dragging img {
        transform: scale(1.015);
      }

      .canvas-tools {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 2px;
        display: flex;
        justify-content: center;
        z-index: 999;
        pointer-events: none;
      }

      .canvas-tools button {
        pointer-events: auto;
        font-family: "Montech", monospace;
        font-size: clamp(10px, 1.4vh, 12px);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--red);
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px 10px;
        opacity: 0.6;
        transition: opacity 0.15s ease;
      }

      .canvas-tools button:hover {
        opacity: 1;
      }

      .canvas-tools button:focus-visible {
        outline: 2px solid var(--red);
        outline-offset: 3px;
      }

      /* ---------- Headline ---------- */
      .headline {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 16vh;
        overflow: hidden;
        color: var(--red);
        font-weight: 900;
        font-style: normal;
        text-transform: uppercase;
        line-height: 0.88;
        letter-spacing: -0.01em;
        font-size: min(9vh, 13.5vw);
        padding: 0 clamp(14px, 3vw, 32px);
        white-space: nowrap;
        position: relative;
        z-index: 1; /* Pushed behind the canvas wrap so items drag over it */
      }

      /* ---------- Marquee ---------- */
      .marquee-band {
        flex: 0 0 auto;
        height: 11vh;
        border-top: 3px solid var(--red);
        /* border-bottom: 3px solid var(--red); */
        background: var(--white);
        overflow: hidden;
        width: 100%;
        display: flex;
        align-items: center;
        position: relative;
        z-index: 10; /* Keeps marquee on top if you want to block elements entirely */
      }

      .marquee-track {
        display: flex;
        align-items: center;
        width: max-content;
        height: 100%;
        animation: scroll-left 22s linear infinite;
      }

      .marquee-track span {
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
        font-weight: 900;
        font-family: "Montech Italic", sans-serif;
        font-style: italic;
        text-transform: uppercase;
        letter-spacing: -0.01em;
        font-size: 6vh;
        color: var(--red);
        padding: 0 clamp(18px, 2.6vw, 30px);
      }

      .marquee-band:hover .marquee-track {
        animation-play-state: paused;
      }

      @keyframes scroll-left {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .marquee-track {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <img src="images/Logo.svg" alt="VOID.DRAFTS" />
    </header>

    <div class="canvas-wrap">
      <div id="canvas"></div>
      <div class="canvas-tools">
        <button type="button" id="resetLayout">[ reset arrangement ]</button>
      </div>
    </div>

    <h1 class="headline">Home for the homegrown brands of India</h1>

    <div class="marquee-band">
      <div class="marquee-track" id="marqueeTrack">
        <span
          >Coming soon \\ Coming soon \\ Coming soon \\ Coming soon \\ Coming
          soon \\ Coming soon \\</span
        >
        <span
          >Coming soon \\ Coming soon \\ Coming soon \\ Coming soon \\ Coming
          soon \\ Coming soon \\</span
        >
      </div>
    </div>

    <script>
      (function () {
        var PRODUCTS = [
          {
            name: "1",
            src: "images/1.png",
            alt: "Water can",
            left: 55,
            top: 30,
            width: 12,
            rotate: 20,
            z: 2,
          },
          {
            name: "2",
            src: "images/2.png",
            alt: "Sauce bottle",
            left: 52,
            top: -2,
            width: 9,
            rotate: -15,
            z: 1,
          },
          {
            name: "3",
            src: "images/3.png",
            alt: "Hand Cream",
            left: 45,
            top: 20,
            width: 12,
            z: 9,
          },
          {
            name: "4",
            src: "images/4.png",
            alt: "Flower vase",
            left: 40,
            top: 10,
            width: 10,
            z: 3,
          },
          {
            name: "5",
            src: "images/5.png",
            alt: "Biscuit tin",
            left: 35,
            top: 40,
            width: 15,
            z: 4,
          },
          {
            name: "6",
            src: "images/6.png",
            alt: "Taxi model",
            left: 45,
            top: 10,
            width: 18,
            z: 5,
          },
          {
            name: "7",
            src: "images/7.png",
            alt: "Bee",
            left: 35,
            top: 10,
            width: 16,
            z: 5,
          },
          {
            name: "8",
            src: "images/8.png",
            alt: "Candle",
            left: 30,
            top: 25,
            width: 14,
            z: 5,
          },
          {
            name: "9",
            src: "images/9.png",
            alt: "Sneaker",
            left: 41,
            top: 67,
            width: 22,
            rotate: 20,
            z: 10,
          },
          {
            name: "10",
            src: "images/10.png",
            alt: "Gulab Jal",
            left: 38,
            top: 45,
            width: 16,
            z: 5,
          },
        ];

        var canvas = document.getElementById("canvas");
        var topZ = 10;
        var originalStyles = [];

        function attachDrag(item) {
          var dragging = false;
          var startX = 0,
            startY = 0;
          var startLeftPx = 0,
            startTopPx = 0;

          item.addEventListener("pointerdown", function (e) {
            dragging = true;
            item.setPointerCapture(e.pointerId);
            item.classList.add("dragging");
            item.style.zIndex = ++topZ;

            var canvasRect = canvas.getBoundingClientRect();
            var itemRect = item.getBoundingClientRect();

            startLeftPx = itemRect.left - canvasRect.left;
            startTopPx = itemRect.top - canvasRect.top;
            item.style.left = startLeftPx + "px";
            item.style.top = startTopPx + "px";

            startX = e.clientX;
            startY = e.clientY;
          });

          item.addEventListener("pointermove", function (e) {
            if (!dragging) return;
            var dx = e.clientX - startX;
            var dy = e.clientY - startY;

            var newLeft = startLeftPx + dx;
            var newTop = startTopPx + dy;

            // DOM Elements for Boundary Math
            var itemRect = item.getBoundingClientRect();
            var canvasRect = canvas.getBoundingClientRect();
            var headlineRect = document
              .querySelector(".headline")
              .getBoundingClientRect();

            // ==========================================
            // STRICT BOUNDARY CALCULATIONS
            // ==========================================
            // Translate the global screen limits into canvas-relative pixels

            // X-Axis: Clamp to the absolute edges of the screen
            var minLeft = 0 - canvasRect.left;
            var maxLeft = window.innerWidth - canvasRect.left - itemRect.width;

            // Y-Axis: Top of screen to the bottom of the headline
            var minTop = 0 - canvasRect.top;
            var maxTop = headlineRect.bottom - canvasRect.top - itemRect.height;

            // Apply clamps
            newLeft = Math.max(minLeft, Math.min(maxLeft, newLeft));
            newTop = Math.max(minTop, Math.min(maxTop, newTop));

            item.style.left = newLeft + "px";
            item.style.top = newTop + "px";
          });

          function endDrag(e) {
            if (!dragging) return;
            dragging = false;
            item.classList.remove("dragging");
            try {
              item.releasePointerCapture(e.pointerId);
            } catch (err) {}
          }

          item.addEventListener("pointerup", endDrag);
          item.addEventListener("pointercancel", endDrag);
        }

        PRODUCTS.forEach(function (p, i) {
          var z = typeof p.z === "number" ? p.z : i + 1;

          var item = document.createElement("div");
          item.className = "drag-item";
          item.dataset.name = p.name;
          item.style.left = p.left + "%";
          item.style.top = p.top + "%";
          item.style.width = p.width + "%";
          item.style.zIndex = z;
          if (p.rotate) {
            item.style.transform = "rotate(" + p.rotate + "deg)";
          }
          var img = document.createElement("img");
          img.src = p.src;
          img.alt = p.alt || p.name;
          img.draggable = false;

          item.appendChild(img);
          canvas.appendChild(item);

          originalStyles.push({
            el: item,
            left: item.style.left,
            top: item.style.top,
            width: item.style.width,
            transform: item.style.transform,
            z: item.style.zIndex,
          });

          attachDrag(item);
        });

        document
          .getElementById("resetLayout")
          .addEventListener("click", function () {
            originalStyles.forEach(function (s) {
              s.el.style.left = s.left;
              s.el.style.top = s.top;
              s.el.style.width = s.width;
              s.el.style.zIndex = s.z;
            });
            topZ = 10;
          });
      })();
    </script>
  </body>
</html>

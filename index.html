<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOID.DRAFTS — Home for the homegrown brands of India</title>

    <style>
      /* ============================================================
      FONT — Montech v02
      ============================================================ */
      @font-face {
        font-family: "Montech";
        src: url("fonts/MONTECHV02-Regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Montech Italic";
        src: url("fonts/MONTECHV02-SemiBoldItalic.otf") format("opentype");
        font-weight: 600;
        font-style: italic;
        font-display: swap;
      }

      @font-face {
        font-family: "Montech Bold";
        src: url("fonts/MONTECHV02-Bold.otf") format("opentype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Montech Black";
        src: url("fonts/MONTECHV02-Black.otf") format("opentype");
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Montech Black Italic";
        src: url("fonts/MONTECHV02-BlackItalic.otf") format("opentype");
        font-weight: 900;
        font-style: italic;
        font-display: swap;
      }

      :root {
        --red: #ff0000;
        --black: #0a0a0a;
        --white: #ffffff;
        --font-display: "Montech", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--white);
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        font-family: var(--font-display);
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        color: var(--black);
        height: 100vh;
        height: 100svh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ---------- Header / Logo ---------- */
      header {
        flex: 0 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 13vh;
        padding: 0 20px;
        z-index: 10;
        position: relative;
      }

      header img {
        width: auto;
        height: clamp(28px, 4vh, 40px);
        display: block;
      }

      /* ---------- Draggable canvas ---------- */
      .canvas-wrap {
        flex: 1 1 auto;
        min-height: 0;
        position: relative;
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        /* FIXED: Changed from hidden to visible so items can overlap headline */
        overflow: visible;
        z-index: 5;
      }

      #canvas {
        position: relative;
        width: 100%;
        max-width: 1100px;
        height: 100%;
        margin: 0 auto;
        touch-action: none;
      }

      .drag-item {
        position: absolute;
        cursor: grab;
        -webkit-user-select: none;
        user-select: none;
        -webkit-user-drag: none;
        touch-action: none;
        /* filter: drop-shadow(0 18px 26px rgba(0, 0, 0, 0.16)); */
        transition: filter 0.18s ease;
        will-change: transform;
      }

      .drag-item img {
        display: block;
        width: 100%;
        height: auto;
        pointer-events: none;
        -webkit-user-drag: none;
      }

      .drag-item:hover {
        /* filter: drop-shadow(0 22px 32px rgba(0, 0, 0, 0.22)); */
      }

      .drag-item.dragging {
        cursor: grabbing;
        /* filter: drop-shadow(0 28px 38px rgba(0, 0, 0, 0.28)); */
      }

      .drag-item.dragging img {
        transform: scale(1.015);
      }

      .canvas-tools {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 2px;
        display: flex;
        justify-content: center;
        z-index: 999;
        pointer-events: none;
      }

      .canvas-tools button {
        pointer-events: auto;
        font-family: "Montech", monospace;
        font-size: clamp(10px, 1.4vh, 12px);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--red);
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px 10px;
        opacity: 0.6;
        transition: opacity 0.15s ease;
      }

      .canvas-tools button:hover {
        opacity: 1;
      }

      .canvas-tools button:focus-visible {
        outline: 2px solid var(--red);
        outline-offset: 3px;
      }

      /* ---------- Headline ---------- */
      .headline {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 16vh;
        overflow: hidden;
        color: var(--red);
        font-weight: 900;
        font-style: normal;
        text-transform: uppercase;
        line-height: 0.88;
        letter-spacing: -0.01em;
        font-size: min(9vh, 13.5vw);
        padding: 0 clamp(14px, 3vw, 32px);
        white-space: nowrap;
        position: relative;
        z-index: 1; /* Pushed behind the canvas wrap so items drag over it */
      }

      /* ---------- Marquee ---------- */
      .marquee-band {
        flex: 0 0 auto;
        height: 11vh;
        border-top: 3px solid var(--red);
        border-bottom: 3px solid var(--red);
        background: var(--white);
        overflow: hidden;
        width: 100%;
        display: flex;
        align-items: center;
        position: relative;
        z-index: 10; /* Keeps marquee on top if you want to block elements entirely */
      }

      .marquee-track {
        display: flex;
        align-items: center;
        width: max-content;
        height: 100%;
        animation: scroll-left 22s linear infinite;
      }

      .marquee-track span {
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
        font-weight: 900;
        font-family: "Montech Italic", sans-serif;
        font-style: italic;
        text-transform: uppercase;
        letter-spacing: -0.01em;
        font-size: 6vh;
        color: var(--red);
        padding: 0 clamp(18px, 2.6vw, 30px);
      }

      .marquee-band:hover .marquee-track {
        animation-play-state: paused;
      }
      /* ---------- Footer ---------- */
      footer {
        flex: 0 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 3vh;
        padding: 0 clamp(14px, 3vw, 32px);
        font-family: "Monotech", monospace;
        font-size: clamp(10px, 1.4vh, 12px);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--black);
        background: var(--white);
      }

      footer a.insta-link {
        color: var(--red);
        text-decoration: none;
        font-weight: bold;
        transition: opacity 0.15s ease;
      }

      footer a.insta-link:hover {
        opacity: 0.6;
      }

      footer a.insta-link:focus-visible {
        outline: 2px solid var(--red);
        outline-offset: 3px;
      }
      @keyframes scroll-left {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .marquee-track {
          animation: none;
        }
      }

      /* ============================================================
         RESPONSIVE — additions only, nothing above this line is
         touched. Desktop (>1024px) renders exactly as before.
         ============================================================ */

      /* ---------- Tablet / iPad (≤1024px) ---------- */
      @media (max-width: 1024px) {
        header {
          height: 11vh;
        }
        header img {
          height: clamp(26px, 4.5vh, 38px);
        }

        .drag-item {
          min-width: 92px;
        }

        .headline {
          height: 15vh;
          font-size: min(8vh, 10.5vw);
        }

        .marquee-band {
          height: 10vh;
        }
        .marquee-track span {
          font-size: 5.2vh;
          padding: 0 clamp(14px, 2.2vw, 26px);
        }

        .canvas-tools button {
          padding: 8px 12px;
          font-size: 12px;
        }
      }

      /* ---------- Mobile phones (≤640px) ---------- */
      @media (max-width: 640px) {
        header {
          height: 9vh;
          padding: 0 14px;
        }
        header img {
          height: clamp(20px, 4vh, 30px);
        }

        .drag-item {
          min-width: 68px;
        }

        .headline {
          height: 13vh;
          font-size: min(6.6vh, 11.5vw);
          letter-spacing: -0.02em;
          padding: 0 clamp(10px, 3vw, 20px);
        }

        .marquee-band {
          height: 8vh;
        }
        .marquee-track span {
          font-size: 2vh;
          padding: 0 clamp(12px, 3vw, 20px);
        }

        .canvas-tools button {
          font-size: 11px;
          padding: 10px 12px; /* larger tap target */
        }
      }

      /* ---------- Very small phones (≤380px) ---------- */
      @media (max-width: 380px) {
        .drag-item {
          min-width: 58px;
        }
        .headline {
          font-size: min(6vh, 12.5vw);
        }
        .marquee-track span {
          font-size: 3.3vh;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <img src="images/Logo.svg" alt="VOID.DRAFTS" />
    </header>

    <div class="canvas-wrap">
      <div id="canvas"></div>
      <div class="canvas-tools">
        <button type="button" id="resetLayout">[ reset arrangement ]</button>
      </div>
    </div>

    <h1 class="headline">Home for the homegrown brands of India</h1>

    <div class="marquee-band">
      <div class="marquee-track" id="marqueeTrack">
        <span
          >Coming soon \\ Coming soon \\ Coming soon \\ Coming soon \\ Coming
          soon \\ Coming soon \\</span
        >
        <span
          >Coming soon \\ Coming soon \\ Coming soon \\ Coming soon \\ Coming
          soon \\ Coming soon \\</span
        >
      </div>
    </div>
    <footer>
      <div class="copyright">© 2026 VOID.DRAFTS</div>
      <a
        href="https://www.instagram.com/void.draftss?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="
        target="_blank"
        rel="noopener noreferrer"
        class="insta-link"
      >
        @void.drafts
      </a>
    </footer>
    <script>
      (function () {
        // ==========================================================
        // DESKTOP LAYOUT — untouched, exactly as provided.
        // ==========================================================
        var PRODUCTS = [
          {
            name: "1",
            src: "images/1.png",
            alt: "Water can",
            left: 55,
            top: 30,
            width: 12,
            rotate: 20,
            z: 2,
          },
          {
            name: "2",
            src: "images/2.png",
            alt: "Sauce bottle",
            left: 52,
            top: -2,
            width: 9,
            rotate: -15,
            z: 1,
          },
          {
            name: "3",
            src: "images/3.png",
            alt: "Hand Cream",
            left: 45,
            top: 20,
            width: 12,
            z: 9,
          },
          {
            name: "4",
            src: "images/4.png",
            alt: "Flower vase",
            left: 40,
            top: 10,
            width: 10,
            z: 3,
          },
          {
            name: "5",
            src: "images/5.png",
            alt: "Biscuit",
            left: 35,
            top: 40,
            width: 15,
            z: 4,
          },
          {
            name: "6",
            src: "images/6.png",
            alt: "Taxi model",
            left: 45,
            top: 10,
            width: 18,
            z: 5,
          },
          {
            name: "7",
            src: "images/7.png",
            alt: "Bee",
            left: 35,
            top: 10,
            width: 16,
            z: 5,
          },
          {
            name: "8",
            src: "images/8.png",
            alt: "Candle",
            left: 30,
            top: 25,
            width: 14,
            z: 5,
          },
          {
            name: "9",
            src: "images/9.png",
            alt: "Sneaker",
            left: 41,
            top: 67,
            width: 22,
            rotate: 20,
            z: 10,
          },
          {
            name: "10",
            src: "images/10.png",
            alt: "Gulab Jal",
            left: 38,
            top: 45,
            width: 16,
            z: 5,
          },
        ];

        // ==========================================================
        // RESPONSIVE POSITIONING — additive only.
        // Desktop keeps using PRODUCTS above, completely unchanged.
        // Below ~640px wide, items rearrange into a tidier scatter
        // sized for a narrow canvas so nothing loads in unreadably
        // small or piled on top of itself. Tablet widths (641–1024)
        // keep the desktop coordinates — same cluster, just resized
        // by the CSS above, since a wide-enough iPad canvas doesn't
        // need repositioning, only smaller type/logo/touch targets.
        // ==========================================================
        var MOBILE_BREAKPOINT = "(max-width: 640px)";

        var MOBILE_POSITIONS = {
          1: { left: 60, top: 45, width: 20, rotate: 14 },
          2: { left: 50, top: 20, width: 15, rotate: -12 },
          3: { left: 45, top: 45, width: 18 },
          4: { left: 30, top: 30, width: 15 },
          5: { left: 30, top: 45, width: 22 },
          6: { left: 55, top: 35, width: 30 },
          7: { left: 35, top: 35, width: 20 },
          8: { left: 25, top: 50, width: 18 },
          9: { left: 38, top: 62, width: 32, rotate: 14 },
          10: { left: 35, top: 55, width: 22 },
        };

        function isMobile() {
          return window.matchMedia(MOBILE_BREAKPOINT).matches;
        }

        function resolvedLayout() {
          if (!isMobile()) return PRODUCTS;
          return PRODUCTS.map(function (p) {
            var override = MOBILE_POSITIONS[p.name];
            if (!override) return p;
            return Object.assign({}, p, override);
          });
        }

        var canvas = document.getElementById("canvas");
        var topZ = 10;
        var originalStyles = [];
        var currentlyDragging = false;

        function attachDrag(item) {
          var dragging = false;
          var startX = 0,
            startY = 0;
          var startLeftPx = 0,
            startTopPx = 0;

          item.addEventListener("pointerdown", function (e) {
            dragging = true;
            currentlyDragging = true;
            item.setPointerCapture(e.pointerId);
            item.classList.add("dragging");
            item.style.zIndex = ++topZ;

            var canvasRect = canvas.getBoundingClientRect();
            var itemRect = item.getBoundingClientRect();

            startLeftPx = itemRect.left - canvasRect.left;
            startTopPx = itemRect.top - canvasRect.top;
            item.style.left = startLeftPx + "px";
            item.style.top = startTopPx + "px";

            startX = e.clientX;
            startY = e.clientY;
          });

          item.addEventListener("pointermove", function (e) {
            if (!dragging) return;
            var dx = e.clientX - startX;
            var dy = e.clientY - startY;

            var newLeft = startLeftPx + dx;
            var newTop = startTopPx + dy;

            // DOM Elements for Boundary Math
            var itemRect = item.getBoundingClientRect();
            var canvasRect = canvas.getBoundingClientRect();
            var headlineRect = document
              .querySelector(".headline")
              .getBoundingClientRect();

            // ==========================================
            // STRICT BOUNDARY CALCULATIONS
            // ==========================================
            // Translate the global screen limits into canvas-relative pixels

            // X-Axis: Clamp to the absolute edges of the screen
            var minLeft = 0 - canvasRect.left;
            var maxLeft = window.innerWidth - canvasRect.left - itemRect.width;

            // Y-Axis: Top of screen to the bottom of the headline
            var minTop = 0 - canvasRect.top;
            var maxTop = headlineRect.bottom - canvasRect.top - itemRect.height;

            // Apply clamps
            newLeft = Math.max(minLeft, Math.min(maxLeft, newLeft));
            newTop = Math.max(minTop, Math.min(maxTop, newTop));

            item.style.left = newLeft + "px";
            item.style.top = newTop + "px";
          });

          function endDrag(e) {
            if (!dragging) return;
            dragging = false;
            currentlyDragging = false;
            item.classList.remove("dragging");
            try {
              item.releasePointerCapture(e.pointerId);
            } catch (err) {}
          }

          item.addEventListener("pointerup", endDrag);
          item.addEventListener("pointercancel", endDrag);
        }

        function buildCanvas() {
          canvas.innerHTML = "";
          originalStyles = [];
          topZ = 10;

          resolvedLayout().forEach(function (p, i) {
            var z = typeof p.z === "number" ? p.z : i + 1;

            var item = document.createElement("div");
            item.className = "drag-item";
            item.dataset.name = p.name;
            item.style.left = p.left + "%";
            item.style.top = p.top + "%";
            item.style.width = p.width + "%";
            item.style.zIndex = z;
            if (p.rotate) {
              item.style.transform = "rotate(" + p.rotate + "deg)";
            }
            var img = document.createElement("img");
            img.src = p.src;
            img.alt = p.alt || p.name;
            img.draggable = false;

            item.appendChild(img);
            canvas.appendChild(item);

            originalStyles.push({
              el: item,
              left: item.style.left,
              top: item.style.top,
              width: item.style.width,
              transform: item.style.transform,
              z: item.style.zIndex,
            });

            attachDrag(item);
          });
        }

        document
          .getElementById("resetLayout")
          .addEventListener("click", function () {
            originalStyles.forEach(function (s) {
              s.el.style.left = s.left;
              s.el.style.top = s.top;
              s.el.style.width = s.width;
              s.el.style.zIndex = s.z;
            });
            topZ = 10;
          });

        buildCanvas();

        // Rebuild only when crossing the mobile/desktop breakpoint
        // (e.g. phone rotation) — never mid-drag, and never on
        // desktop-only resizes, so the desktop experience is
        // unaffected either way.
        var mobileQuery = window.matchMedia(MOBILE_BREAKPOINT);
        var wasMobile = mobileQuery.matches;
        function handleBreakpointChange() {
          if (currentlyDragging) return;
          var nowMobile = mobileQuery.matches;
          if (nowMobile !== wasMobile) {
            wasMobile = nowMobile;
            buildCanvas();
          }
        }
        if (mobileQuery.addEventListener) {
          mobileQuery.addEventListener("change", handleBreakpointChange);
        } else if (mobileQuery.addListener) {
          mobileQuery.addListener(handleBreakpointChange);
        }

        // ==========================================================
        // HEADLINE AUTO-FIT — tablet & mobile only (≤1024px).
        // ------------------------------------------------------------
        // The CSS min(vh,vw) sizing above is a rough guess at what
        // fits — it doesn't know the real character widths of
        // Montech once it loads, so on some viewports the line can
        // clip instead of truly filling the row. This measures the
        // headline's actual text width with Canvas measureText()
        // and sets an exact font-size so it always fits edge-to-edge
        // with no clipping, at any phone/tablet size or orientation.
        //
        // (Note: this deliberately avoids reading scrollWidth on the
        // headline element — with overflow:hidden + centered flex
        // content, browsers report scrollWidth as symmetric overflow
        // on both sides once it clips, which isn't the same number
        // as the text's real rendered width. measureText sidesteps
        // that entirely.)
        //
        // Desktop (>1024px) is intentionally skipped — it keeps
        // using the untouched CSS font-size only, exactly as before.
        // ==========================================================
        var headlineEl = document.querySelector(".headline");
        var HEADLINE_BREAKPOINT = "(max-width: 1024px)";
        var headlineQuery = window.matchMedia(HEADLINE_BREAKPOINT);
        var LINE_HEIGHT_RATIO = 0.88;
        var SAFETY_MARGIN = 0.97; // small buffer so text never touches the edge
        var measureCanvas = document.createElement("canvas");
        var measureCtx = measureCanvas.getContext("2d");

        function measureTextWidth(text, fontCss) {
          measureCtx.font = fontCss;
          return measureCtx.measureText(text).width;
        }

        function fitHeadline() {
          if (!headlineQuery.matches) {
            // back on desktop — remove any inline override so the
            // original CSS rule takes over again, untouched
            headlineEl.style.fontSize = "";
            return;
          }

          // reset to the CSS baseline for this breakpoint before
          // measuring, so repeated calls don't compound
          headlineEl.style.fontSize = "";

          var computed = window.getComputedStyle(headlineEl);
          var baseFontSizePx = parseFloat(computed.fontSize);
          if (!baseFontSizePx) return;

          var paddingLeft = parseFloat(computed.paddingLeft) || 0;
          var paddingRight = parseFloat(computed.paddingRight) || 0;
          var availableWidth =
            headlineEl.clientWidth - paddingLeft - paddingRight;
          var availableHeight = headlineEl.clientHeight;

          var fontCss =
            computed.fontStyle +
            " " +
            computed.fontWeight +
            " " +
            baseFontSizePx +
            "px " +
            computed.fontFamily;
          var naturalTextWidth = measureTextWidth(
            headlineEl.textContent.trim(),
            fontCss,
          );
          if (!availableWidth || !naturalTextWidth) return;

          var widthScale = availableWidth / naturalTextWidth;
          var heightScale =
            availableHeight / (baseFontSizePx * LINE_HEIGHT_RATIO);

          var scale = Math.min(widthScale, heightScale) * SAFETY_MARGIN;
          // guard against runaway growth on very short strings —
          // never scale up more than 40% beyond the CSS baseline
          scale = Math.min(scale, 1.4);

          var newFontSizePx = baseFontSizePx * scale;
          headlineEl.style.fontSize = newFontSizePx + "px";
        }

        var fitHeadlineFrame = null;
        function scheduleFitHeadline() {
          if (fitHeadlineFrame) cancelAnimationFrame(fitHeadlineFrame);
          fitHeadlineFrame = requestAnimationFrame(fitHeadline);
        }

        scheduleFitHeadline();
        window.addEventListener("resize", scheduleFitHeadline);
        window.addEventListener("orientationchange", scheduleFitHeadline);
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(scheduleFitHeadline);
        }
      })();
    </script>
  </body>
</html>
